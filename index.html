<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Issack John</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
        <main class="mx-auto max-w-5xl px-6 py-12 md:py-20">
            <section class="rounded-2xl border border-slate-800 bg-slate-900/70 p-8 shadow-2xl shadow-slate-950/60">
                <p class="text-sm uppercase tracking-[0.2em] text-cyan-300">Issack John</p>
                <h1 class="mt-3 text-4xl font-bold leading-tight text-white md:text-5xl">Web Performance Work, Notes, and Experiments</h1>
                <p class="mt-4 max-w-2xl text-base text-slate-300">A cleaner home for Speedometer explorations, blog posts, and references I keep coming back to.</p>
            </section>

            <section class="mt-10">
                <h2 class="text-xl font-semibold text-white">Featured Links</h2>
                <div id="featuredLinksList" class="mt-4 grid gap-4 sm:grid-cols-2"></div>
            </section>

            <section class="mt-12">
                <h2 class="text-xl font-semibold text-white">Latest Blog Posts</h2>
                <div id="blogPostsList" class="mt-4 space-y-4"></div>
            </section>

            <section class="mt-12">
                <h2 class="text-xl font-semibold text-white">Speedometer Work</h2>
                <div id="projectsList" class="mt-4 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
            </section>

            <section class="mt-12">
                <h2 class="text-xl font-semibold text-white">Recommended Videos</h2>
                <ul id="videosList" class="mt-4 space-y-3"></ul>
            </section>
        </main>

        <script>
            const featuredLinks = [
                {
                    title: "V8 commits by issackjohn",
                    description: "Track all commits authored in v8/main.",
                    url: "https://github.com/v8/v8/commits/main/?author=issackjohn",
                    cta: "View commits",
                },
            ];

            const blogPosts = [
                {
                    title: "Contributing to Speedometer 3.0",
                    summary: "Capturing real-world challenges on the web",
                    url: "https://blogs.windows.com/msedgedev/2024/03/11/contributing-to-speedometer-30/",
                },
            ];

            const projects = [
                {
                    title: "Speedometer 3.0",
                    summary: "2024-01-24",
                    url: "https://issackjohn.github.io/speedometer.html",
                },
                {
                    title: "Complex Workloads",
                    summary: "Speedometer 3.0",
                    url: "https://issackjohn.github.io/complex-workloads.html",
                },
                {
                    title: "With Complex DOM",
                    summary: "2023-06-27",
                    url: "https://issackjohn.github.io/speedometer-with-complex.html",
                },
                {
                    title: "New Structure + Complex DOM",
                    summary: "2023-09-18",
                    url: "https://issackjohn.github.io/speedometer",
                },
                {
                    title: "JavaScript Web Components",
                    summary: "Speedometer 3.0",
                    url: "https://issackjohn.github.io/SpeedometerJSWebComponents",
                },
            ];

            const videos = [{ url: "https://youtu.be/Lp3e1C54jZM?si=S_DvlMjmYVTo4exo", title: "Jim Rohn - Give To Receive" }];

            function buildCard({ title, summary, description, url, cta = "Open" }) {
                const article = document.createElement("article");
                article.className = "group rounded-xl border border-slate-800 bg-slate-900 p-5 transition hover:-translate-y-0.5 hover:border-cyan-400/70 hover:bg-slate-900/90";

                const heading = document.createElement("h3");
                heading.className = "text-lg font-semibold text-white";
                heading.textContent = title;

                const detail = document.createElement("p");
                detail.className = "mt-2 text-sm text-slate-300";
                detail.textContent = description || summary || "";

                const link = document.createElement("a");
                link.href = url;
                link.className = "mt-4 inline-flex items-center text-sm font-medium text-cyan-300 hover:text-cyan-200";
                link.textContent = cta;

                article.appendChild(heading);
                if (detail.textContent) {
                    article.appendChild(detail);
                }
                article.appendChild(link);

                return article;
            }

            const featuredLinksList = document.getElementById("featuredLinksList");
            featuredLinks.forEach((item) => {
                featuredLinksList.appendChild(buildCard(item));
            });

            const blogPostsList = document.getElementById("blogPostsList");
            blogPosts.forEach((post) => {
                blogPostsList.appendChild(buildCard({ ...post, cta: "Read post" }));
            });

            const projectsList = document.getElementById("projectsList");
            projects.forEach((project) => {
                projectsList.appendChild(buildCard({ ...project, cta: "Visit project" }));
            });

            const videosList = document.getElementById("videosList");
            videos.forEach((video) => {
                const li = document.createElement("li");
                li.className = "rounded-lg border border-slate-800 bg-slate-900 px-4 py-3 text-slate-200";

                const a = document.createElement("a");
                a.href = video.url;
                a.textContent = video.title;
                a.className = "text-cyan-300 hover:text-cyan-200";

                li.appendChild(a);
                videosList.appendChild(li);
            });
        </script>
    </body>
</html>
