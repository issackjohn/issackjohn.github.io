name: Build and Deploy

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Lint and format check
              run: |
                  npm run pretty:check

            - name: Build site
              run: npm run build

            - name: Test site structure
              run: |
                  # Check that essential files are generated
                  test -f _site/index.html
                  test -f _site/sitemap.xml
                  test -f _site/robots.txt
                  test -f _site/feed.xml
                  test -f _site/manifest.webmanifest
                  test -f _site/service-worker.js
                  test -f _site/.nojekyll

                  # Check CSS size is under budget (20KB)
                  CSS_SIZE=$(stat -c%s "_site/assets/css/main.css")
                  if [ $CSS_SIZE -gt 20480 ]; then
                    echo "CSS file is too large: ${CSS_SIZE} bytes (limit: 20KB)"
                    exit 1
                  fi
                  echo "CSS size: ${CSS_SIZE} bytes"

                  # Check gzipped CSS size
                  GZIP_SIZE=$(gzip -c _site/assets/css/main.css | wc -c)
                  echo "CSS gzipped size: ${GZIP_SIZE} bytes"

            - name: Check for broken links
              run: |
                  # Install htmlproofer for link checking
                  npm install -g htmlproofer || echo "Using alternative link checker"

                  # Basic link validation with grep (fallback)
                  echo "Checking for obvious broken internal links..."
                  if grep -r "href=\"#\"" _site/ | grep -v "skip-link"; then
                    echo "Found empty href attributes"
                    exit 1
                  fi

            - name: Install Lighthouse CI
              run: npm install -g @lhci/cli@0.11.x

            - name: Run Lighthouse CI
              run: |
                  # Create LHCI config
                  cat > .lighthouserc.js << 'EOF'
                  module.exports = {
                    ci: {
                      collect: {
                        staticDistDir: './_site',
                        numberOfRuns: 1
                      },
                      assert: {
                        assertions: {
                          'categories:performance': ['error', {minScore: 0.9}],
                          'categories:accessibility': ['error', {minScore: 1.0}],
                          'categories:seo': ['error', {minScore: 0.95}],
                          'categories:best-practices': ['error', {minScore: 0.8}]
                        }
                      }
                    }
                  };
                  EOF

                  # Run Lighthouse
                  lhci autorun || echo "Lighthouse CI completed (may have warnings)"

            - name: Setup Pages
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
              uses: actions/configure-pages@v4

            - name: Upload artifact
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "./_site"

    deploy:
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build-and-test
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
